<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手机扫码安装</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, sans-serif;
    background: #FFFDE7;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px 20px;
  }
  .card {
    background: #fff;
    border-radius: 24px;
    padding: 32px 28px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    text-align: center;
  }
  .icon { font-size: 56px; margin-bottom: 12px; }
  h1 { font-size: 22px; font-weight: 800; color: #222; margin-bottom: 6px; }
  .sub { font-size: 14px; color: #888; margin-bottom: 28px; }
  #qr-container {
    width: 200px; height: 200px;
    margin: 0 auto 24px;
    border: 4px solid #FFD600;
    border-radius: 16px;
    overflow: hidden;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #qr-container canvas { display: block; }
  .url-box {
    background: #FFFDE7;
    border: 2px dashed #FFD600;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 15px;
    font-weight: 700;
    color: #333;
    word-break: break-all;
    margin-bottom: 20px;
    cursor: pointer;
    user-select: all;
  }
  .steps {
    text-align: left;
    background: #f9f9f9;
    border-radius: 14px;
    padding: 16px 18px;
    font-size: 13px;
    line-height: 2;
    color: #555;
  }
  .steps b { color: #222; }
  .badge {
    display: inline-block;
    background: #FFD600;
    color: #222;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    margin-bottom: 20px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="icon">📱</div>
  <h1>手机扫码打开</h1>
  <div class="sub">确保手机和电脑在同一个 WiFi 下</div>
  <span class="badge">iPhone / Android 通用</span>
  <div id="qr-container">
    <div id="qr-placeholder" style="color:#ccc;font-size:12px;">生成中...</div>
  </div>
  <div class="url-box" id="url-text" onclick="copyUrl()">点击复制网址</div>
  <div class="steps">
    <b>📲 iPhone 安装为 App：</b><br>
    1. 手机扫描上方二维码<br>
    2. 在 <b>Safari</b> 中打开（⚠️ 不能用微信扫）<br>
    3. 点底部 <b>📤 分享</b> → <b>「添加到主屏幕」</b><br>
    4. 点右上角 <b>「添加」</b>，完成 ✅
  </div>
</div>

<script>
// 动态获取当前服务器地址并生成二维码
const targetUrl = location.protocol + '//' + location.hostname + ':8765/index.html';
document.getElementById('url-text').textContent = targetUrl;

function copyUrl() {
  navigator.clipboard.writeText(targetUrl).then(() => {
    const el = document.getElementById('url-text');
    el.textContent = '✅ 已复制！';
    setTimeout(() => { el.textContent = targetUrl; }, 2000);
  }).catch(() => {
    const el = document.getElementById('url-text');
    el.style.background = '#fff3cd';
    el.title = '请手动选中复制';
  });
}

// 使用 qrcode.js CDN 生成二维码
(function loadQR() {
  const script = document.createElement('script');
  script.src = 'https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js';
  script.onload = () => {
    document.getElementById('qr-placeholder').style.display = 'none';
    new QRCode(document.getElementById('qr-container'), {
      text: targetUrl,
      width: 192,
      height: 192,
      colorDark: '#222222',
      colorLight: '#ffffff',
      correctLevel: QRCode.CorrectLevel.H
    });
  };
  script.onerror = () => {
    // 离线时降级：显示 URL 让用户手动输入
    document.getElementById('qr-placeholder').innerHTML =
      '<div style="padding:16px;font-size:12px;color:#888;line-height:1.8">网络不可用<br>请手动在手机 Safari 输入下方网址</div>';
  };
  document.head.appendChild(script);
})();
</script>
</body>
</html>
